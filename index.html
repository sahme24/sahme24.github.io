<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salman Ahmed | Cybersecurity &amp; Infrastructure</title>
  <meta name="description" content="Salman Ahmed &mdash; Cybersecurity student at Carleton University. Virtualization &amp; Infrastructure Co-op at DND. Level II Secret Clearance." />
  <style>
    /* ââ TOKENS âââââââââââââââââââââââââââââââââââââ */
    :root {
      --bg:          #07070f;
      --bg2:         #0d0d1a;
      --card:        rgba(255,255,255,0.03);
      --card-border: rgba(0,210,255,0.12);
      --text:        #e2e8f0;
      --muted:       #94a3b8;
      --accent:      #00d2ff;
      --accent2:     #7c3aed;
      --nav-bg:      rgba(7,7,15,0.82);
      --radius:      14px;
    }
    body.light {
      --bg:          #f0f4f8;
      --bg2:         #ffffff;
      --card:        rgba(255,255,255,0.75);
      --card-border: rgba(0,150,200,0.2);
      --text:        #1e293b;
      --muted:       #64748b;
      --accent:      #0284c7;
      --accent2:     #7c3aed;
      --nav-bg:      rgba(240,244,248,0.88);
    }

    /* ââ RESET ââââââââââââââââââââââââââââââââââââââ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; font-size:16px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background .35s, color .35s;
      overflow-x: hidden;
      line-height: 1.6;
    }
    a { text-decoration:none; color:inherit; }
    img { display:block; max-width:100%; }
    button { font-family: inherit; }

    /* ââ NAV ââââââââââââââââââââââââââââââââââââââââ */
    nav {
      position: fixed; top:0; left:0; right:0; z-index:900;
      height: 62px;
      display: flex; align-items:center; justify-content:space-between;
      padding: 0 2.5rem;
      background: var(--nav-bg);
      backdrop-filter: blur(24px) saturate(1.4);
      border-bottom: 1px solid var(--card-border);
    }
    .logo { font-size:1.1rem; font-weight:800; letter-spacing:-0.5px; color: var(--accent); }
    .logo span { color: var(--text); }
    .nav-right { display: flex; align-items:center; gap:2rem; }
    .nav-links { display: flex; gap:1.8rem; list-style:none; }
    .nav-links a { font-size:.875rem; font-weight:500; color:var(--muted); transition:color .2s; }
    .nav-links a:hover { color:var(--accent); }
    .theme-btn {
      background:none; border:none; cursor:pointer;
      font-size:1.15rem; color:var(--muted);
      transition:color .2s; line-height:1; padding: 4px;
      display:flex; align-items:center;
    }
    .theme-btn:hover { color:var(--accent); }
    .hamburger { display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:4px; }
    .hamburger span { display:block; width:22px; height:2px; background:var(--text); border-radius:2px; transition:.3s; }
    .mobile-nav {
      display:none; flex-direction:column;
      position:fixed; top:62px; left:0; right:0; z-index:899;
      background:var(--nav-bg); backdrop-filter:blur(24px);
      border-bottom:1px solid var(--card-border);
      padding:1.5rem 2.5rem; gap:1.2rem;
    }
    .mobile-nav.open { display:flex; }
    .mobile-nav a { font-size:.95rem; font-weight:500; color:var(--muted); transition:color .2s; }
    .mobile-nav a:hover { color:var(--accent); }

    /* ââ HERO âââââââââââââââââââââââââââââââââââââââ */
    .hero {
      min-height: 100vh;
      display: flex; align-items:center; justify-content:center;
      position: relative; overflow:hidden;
      padding: 7rem 2rem 5rem;
    }
    .hero::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,210,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,210,255,.04) 1px, transparent 1px);
      background-size: 52px 52px;
    }
    .hero::after {
      content:''; position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse 60% 50% at 15% 55%, rgba(0,210,255,.09) 0%, transparent 70%),
        radial-gradient(ellipse 55% 45% at 85% 20%, rgba(124,58,237,.09) 0%, transparent 70%);
    }
    .hero-inner {
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center;
      text-align:center; max-width:820px; width:100%;
    }
    .hero-pill {
      display:inline-flex; align-items:center; gap:.55rem;
      padding:.38rem 1.1rem; border-radius:100px;
      background:rgba(0,210,255,.08); border:1px solid rgba(0,210,255,.28);
      font-size:.78rem; font-weight:600; color:var(--accent);
      letter-spacing:.3px; margin-bottom:1.8rem;
    }
    .hero-pill .dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--accent); animation: dot-pulse 2s ease-in-out infinite;
    }
    @keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.35;transform:scale(.8);} }
    .hero h1 {
      font-size: clamp(2.6rem, 7vw, 5rem);
      font-weight:900; letter-spacing:-2.5px; line-height:1.05; margin-bottom:.9rem;
    }
    .hero h1 .hi { color:var(--muted); font-weight:400; font-size:.48em; letter-spacing:0; display:block; margin-bottom:.3rem; }
    .hero h1 .accent { color:var(--accent); }
    .hero-sub { font-size:1.1rem; color:var(--muted); margin-bottom:.5rem; }
    .typewriter-wrap { font-family:'Courier New', Courier, monospace; font-size:.95rem; color:var(--accent); margin-bottom:2.2rem; min-height:1.6em; }
    .cursor { animation:blink 1s step-end infinite; }
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
    .hero-cta { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; margin-bottom:2.5rem; }
    .btn {
      display:inline-flex; align-items:center; gap:.5rem;
      padding:.7rem 1.6rem; border-radius:9px;
      font-size:.875rem; font-weight:600;
      cursor:pointer; border:none; transition:all .2s;
    }
    .btn-primary { background:var(--accent); color:#000; }
    .btn-primary:hover { filter:brightness(1.1); transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,210,255,.3); }
    .btn-ghost { background:transparent; border:1px solid var(--card-border); color:var(--text); }
    .btn-ghost:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-2px); }
    .hero-socials { display:flex; gap:.9rem; }
    .s-link {
      width:40px; height:40px; border-radius:10px;
      background:var(--card); border:1px solid var(--card-border);
      display:flex; align-items:center; justify-content:center;
      color:var(--muted); transition:all .2s;
    }
    .s-link:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-3px); }
    .scroll-cue {
      position:absolute; bottom:2rem; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:6px;
      color:var(--muted); font-size:.72rem; letter-spacing:1px; text-transform:uppercase;
    }
    .scroll-cue .bar { width:1px; height:44px; background:linear-gradient(var(--accent), transparent); animation:bar-grow 2s ease-in-out infinite; }
    @keyframes bar-grow{ 0%{opacity:0;transform:scaleY(0);transform-origin:top;} 50%{opacity:1;transform:scaleY(1);} 100%{opacity:0;transform:scaleY(1);transform-origin:bottom;} }

    /* ââ SECTION SHELL ââââââââââââââââââââââââââââââ */
    .section { padding: 6rem 2rem; max-width:1120px; margin:0 auto; }
    .section-eyebrow { font-size:.72rem; font-weight:700; letter-spacing:3.5px; text-transform:uppercase; color:var(--accent); margin-bottom:.5rem; }
    .section-heading { font-size: clamp(1.75rem, 4vw, 2.6rem); font-weight:800; letter-spacing:-1px; margin-bottom:2.8rem; }

    /* ââ ABOUT ââââââââââââââââââââââââââââââââââââââ */
    .about-layout { display:grid; grid-template-columns:1fr 1fr; grid-template-rows:auto auto; gap:1.4rem; }
    .card { background:var(--card); border:1px solid var(--card-border); border-radius:var(--radius); padding:1.9rem; transition:border-color .3s, transform .3s, box-shadow .3s; }
    .card:hover { border-color:var(--accent); transform:translateY(-5px); box-shadow:0 12px 40px rgba(0,210,255,.07); }
    .card-icon { display:flex; align-items:center; margin-bottom:1rem; color:var(--accent); }
    .card h3 { font-size:1rem; font-weight:700; margin-bottom:1.3rem; }
    .exp-item { padding-bottom:1.2rem; margin-bottom:1.2rem; border-bottom:1px solid var(--card-border); }
    .exp-item:last-child { border-bottom:none; padding-bottom:0; margin-bottom:0; }
    .exp-role { font-size:.93rem; font-weight:700; }
    .exp-org { font-size:.82rem; color:var(--accent); margin:.2rem 0; }
    .exp-date { font-size:.74rem; color:var(--muted); }
    .tag-row { display:flex; flex-wrap:wrap; gap:.45rem; margin-top:.9rem; }
    .tag { padding:.28rem .75rem; border-radius:100px; font-size:.73rem; font-weight:600; background:rgba(0,210,255,.09); color:var(--accent); border:1px solid rgba(0,210,255,.22); }
    .bio-card { grid-column:1 / -1; }
    .bio-card p { font-size:.92rem; color:var(--muted); line-height:1.85; margin-bottom:.9rem; }
    .bio-card p:last-child { margin-bottom:0; }
    .bio-card strong { color:var(--text); }

    .clearance-strip {
      display:flex; align-items:center; gap:1.4rem;
      background:linear-gradient(135deg, rgba(0,210,255,.07), rgba(124,58,237,.07));
      border:1px solid var(--card-border); border-radius:var(--radius);
      padding:1.6rem 2rem; margin-bottom:1.4rem;
    }
    .clearance-strip .icon { flex-shrink:0; color:var(--accent); }
    .clearance-strip h3 { font-size:.95rem; font-weight:700; margin-bottom:.2rem; }
    .clearance-strip p { font-size:.83rem; color:var(--muted); }

    /* ââ PROJECTS âââââââââââââââââââââââââââââââââââ */
    .projects-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(310px, 1fr)); gap:1.4rem; }
    .proj-card {
      background:var(--card); border:1px solid var(--card-border);
      border-radius:var(--radius); padding:1.8rem;
      position:relative; overflow:hidden; transition:all .3s;
    }
    .proj-card::before { content:''; position:absolute; inset:0; pointer-events:none; background:linear-gradient(140deg, rgba(0,210,255,.06), transparent 60%); opacity:0; transition:opacity .3s; }
    .proj-card:hover { border-color:var(--accent); transform:translateY(-6px); box-shadow:0 16px 48px rgba(0,210,255,.08); }
    .proj-card:hover::before { opacity:1; }
    .proj-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:.9rem; }
    .proj-icon { color:var(--accent); }
    .proj-links { display:flex; gap:.45rem; }
    .proj-link {
      width:32px; height:32px; border-radius:8px;
      border:1px solid var(--card-border);
      display:flex; align-items:center; justify-content:center;
      color:var(--muted); transition:all .2s;
    }
    .proj-link:hover { border-color:var(--accent); color:var(--accent); }
    .proj-card h3 { font-size:.97rem; font-weight:700; margin-bottom:.55rem; }
    .proj-card p { font-size:.84rem; color:var(--muted); line-height:1.75; margin-bottom:1.1rem; }
    .stack { display:flex; flex-wrap:wrap; gap:.38rem; }
    .chip { padding:.22rem .6rem; border-radius:6px; font-size:.trem; font-weight:700; background:rgba(124,58,237,.13); color:#a78bfa; border:1px solid rgba(124,58,237,.22); }

    /* ââ SKILLS âââââââââââââââââââââââââââââââââââââ */
    .skills-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:1.1rem; }
    .skill-box { background:var(--card); border:1px solid var(--card-border); border-radius:var(--radius); padding:1.4rem; transition:border-color .25s; }
    .skill-box:hover { border-color:var(--accent); }
    .skill-box h4 { font-size:.74rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--accent); margin-bottom:.85rem; display:flex; align-items:center; gap:.4rem; }
    .skill-pills { display:flex; flex-wrap:wrap; gap:.4rem; }
    .pill { padding:.25rem .65rem; border-radius:6px; font-size:.76rem; background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--card-border); }
    body.light .pill { background:rgba(0,0,0,.05); }

    /* ââ CONTACT ââââââââââââââââââââââââââââââââââââ */
    .contact-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:1.1rem; }
    .c-card { display:flex; align-items:center; gap:1rem; background:var(--card); border:1px solid var(--card-border); border-radius:var(--radius); padding:1.5rem; transition:all .25s; color:var(--text); }
    .c-card:hover { border-color:var(--accent); transform:translateY(-4px); box-shadow:0 10px 32px rgba(0,210,255,.07); }
    .c-icon { width:48px; height:48px; flex-shrink:0; border-radius:11px; background:rgba(0,210,255,.1); display:flex; align-items:center; justify-content:center; color:var(--accent); }
    .c-label { font-size:.74rem; color:var(--muted); margin-bottom:.2rem; }
    .c-value { font-size:.88rem; font-weight:600; }

    /* ââ QUIZ âââââââââââââââââââââââââââââââââââââââ */
    .quiz-wrap {
      max-width: 680px; margin: 0 auto;
    }
    .quiz-box {
      background:var(--card); border:1px solid var(--card-border);
      border-radius:var(--radius); padding:2rem; position:relative;
    }
    .quiz-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.4rem;
    }
    .quiz-q-label {
      display:flex; align-items:center; gap:.6rem;
      font-size:.95rem; font-weight:700; color:var(--text);
    }
    .quiz-badges { display:flex; gap:.5rem; }
    .badge-diff {
      padding:.22rem .7rem; border-radius:100px;
      font-size:.72rem; font-weight:700;
    }
    .badge-easy   { background:rgba(34,197,94,.15); color:#4ade80; border:1px solid rgba(34,197,94,.3); }
    .badge-medium { background:rgba(251,191,36,.15); color:#fbbf24; border:1px solid rgba(251,191,36,.3); }
    .badge-hard   { background:rgba(239,68,68,.15);  color:#f87171; border:1px solid rgba(239,68,68,.3); }
    .badge-score  { padding:.22rem .7rem; border-radius:100px; font-size:.72rem; font-weight:700; background:rgba(0,210,255,.1); color:var(--accent); border:1px solid rgba(0,210,255,.25); }
    .quiz-question { font-size:1rem; font-weight:600; color:var(--text); margin-bottom:1.2rem; line-height:1.5; }
    .quiz-options { display:flex; flex-direction:column; gap:.6rem; margin-bottom:1.4rem; }
    .quiz-opt {
      display:flex; align-items:center; gap:.8rem;
      background:rgba(255,255,255,.04); border:1px solid var(--card-border);
      border-radius:10px; padding:.85rem 1rem; cursor:pointer;
      transition:all .2s; font-size:.88rem; color:var(--text);
      text-align:left; width:100%;
    }
    body.light .quiz-opt { background:rgba(0,0,0,.03); }
    .quiz-opt:hover:not(:disabled) { border-color:var(--accent); background:rgba(0,210,255,.05); }
    .quiz-opt.correct  { border-color:#4ade80; background:rgba(34,197,94,.1); color:#4ade80; }
    .quiz-opt.wrong    { border-color:#f87171; background:rgba(239,68,68,.1);  color:#f87171; }
    .quiz-opt.reveal   { border-color:#4ade80; background:rgba(34,197,94,.07); }
    .quiz-opt:disabled { cursor:default; }
    .opt-letter { width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; background:rgba(255,255,255,.08); color:var(--muted); flex-shrink:0; }
    .quiz-opt.correct .opt-letter  { background:rgba(34,197,94,.3); color:#4ade80; }
    .quiz-opt.wrong   .opt-letter  { background:rgba(239,68,68,.3);  color:#f87171; }
    .quiz-opt.reveal  .opt-letter  { background:rgba(34,197,94,.2);  color:#4ade80; }
    .quiz-next {
      width:100%; padding:.85rem; border:none; border-radius:10px;
      background:var(--accent); color:#000; font-size:.9rem; font-weight:700;
      cursor:pointer; transition:all .2s; opacity:.4; pointer-events:none;
    }
    .quiz-next.active { opacity:1; pointer-events:auto; }
    .quiz-next:hover.active { filter:brightness(1.1); transform:translateY(-1px); }
    .quiz-progress { height:3px; background:rgba(255,255,255,.08); border-radius:2px; margin-bottom:1.6rem; overflow:hidden; }
    .quiz-progress-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .4s ease; }
    .quiz-result { text-align:center; padding:1rem 0; }
    .quiz-result .score-big { font-size:3.5rem; font-weight:900; color:var(--accent); line-height:1; margin-bottom:.5rem; }
    .quiz-result .score-sub { font-size:.9rem; color:var(--muted); margin-bottom:1.4rem; }
    .quiz-result .result-msg { font-size:.95rem; color:var(--text); margin-bottom:1.6rem; line-height:1.6; }
    .quiz-restart { padding:.75rem 2rem; border-radius:10px; background:var(--accent); color:#000; font-size:.88rem; font-weight:700; border:none; cursor:pointer; transition:all .2s; }
